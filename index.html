<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Analysis Tool</title>

<!-- ✅ JSZip: Required for DOCX extraction + ZIP export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
    :root {
        --yellow: #FED517;
        --linen: #FAEFE6;
        --dark: #2B2727;

        /* Dark mode */
        --dark-bg: #1b1b1b;
        --dark-panel: #2a2a2a;
        --dark-text: #f2f2f2;
        --dark-border: #555;
    }

    body {
        font-family: Arial, sans-serif;
        background: var(--linen);
        margin: 0;
        padding: 0;
        color: var(--dark);
        transition: 0.3s;
    }

    body.dark {
        background: var(--dark-bg);
        color: var(--dark-text);
    }

    header {
        background: var(--yellow);
        padding: 20px;
        font-size: 1.8em;
        font-weight: bold;
        color: var(--dark);
        text-align: center;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header .dark-toggle {
        font-size: 0.6em;
        cursor: pointer;
        background: var(--dark);
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
    }

    .container {
        padding: 20px 30px;
    }

    .upload-box {
        border: 2px dashed var(--dark);
        padding: 20px;
        background: white;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    body.dark .upload-box {
        background: var(--dark-panel);
        border-color: var(--dark-border);
    }

    button {
        background: var(--dark);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
        margin: 10px 0;
        transition: 0.3s;
    }
    button:hover {
        background: black;
    }

    h2 {
        margin-top: 40px;
        border-bottom: 4px solid var(--yellow);
        padding-bottom: 5px;
    }

    /* Accordion */
    .accordion {
        background: var(--yellow);
        color: var(--dark);
        cursor: pointer;
        padding: 14px;
        width: 100%;
        border: none;
        outline: none;
        border-radius: 6px;
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
    }
    body.dark .accordion {
        background: var(--dark-panel);
        color: var(--dark-text);
        border: 1px solid var(--dark-border);
    }
    .accordion .icon {
        transition: transform 0.3s ease;
        font-weight: bold;
    }
    .accordion.active .icon {
        transform: rotate(90deg);
    }

    .panel {
        padding: 0 15px;
        display: none;
        overflow: hidden;
    }

    /* Group boxes */
    .match-group {
        background: #fff8d4;
        padding: 15px;
        border-left: 5px solid var(--yellow);
        margin-bottom: 30px;
        border-radius: 6px;
    }

    body.dark .match-group {
        background: var(--dark-panel);
        border-color: var(--yellow);
    }

    .image-card {
        background: white;
        border: 1px solid var(--dark);
        border-radius: 8px;
        width: 240px;
        padding: 10px;
        margin: 10px;
        display: inline-block;
        vertical-align: top;
        transition: 0.3s;
    }
    body.dark .image-card {
        background: var(--dark-panel);
        border-color: var(--dark-border);
        color: var(--dark-text);
    }

    img {
        max-width: 220px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
    }

    code {
        background: #eee;
        padding: 3px 5px;
        display: block;
        font-size: 0.8em;
        word-break: break-all;
    }
    body.dark code {
        background: #333;
        color: var(--dark-text);
    }
</style>
</head>

<body>

<header>
    Image Analysis Tool
    <div class="dark-toggle" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</div>
</header>

<div class="container">

    <div class="upload-box">
        <h3>Select multiple DOCX files:</h3>
        <input type="file" id="files" accept=".docx" multiple>
    </div>

    <button onclick="processAll()">Process Documents</button>
    <button onclick="exportZIP()">Download Extracted Images (ZIP)</button>

    <h2>Results</h2>
    <div id="results"></div>

    <h2>Export Data</h2>
    <button onclick="downloadCSV_SHA()">Download SHA‑256 CSV</button>

</div>

<script>
/* ---------------- DARK MODE ---------------- */
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

/* ---------------- SHA256 ---------------- */
async function sha256(uint8) {
    const buf = await crypto.subtle.digest("SHA-256", uint8);
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ---------------- Extract Images ---------------- */
async function extractImagesFromDocx(file){
    const buffer = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(buffer);

    const imgs=[];
    const media = Object.keys(zip.files).filter(p=>p.startsWith("word/media/"));

    for (const path of media){
        const data = await zip.files[path].async("uint8array");
        imgs.push({ fileName:file.name, internalName:path, data });
    }
    return imgs;
}

/* ---------------- Load image ---------------- */
function loadImage(url){
    return new Promise(res=>{
        let img=new Image();
        img.onload=()=>res(img);
        img.src=url;
    });
}

/* ---------------- MAIN PROCESS ---------------- */
async function processAll(){
    const FL=document.getElementById("files").files;
    if(FL.length===0){
        alert("Select files first.");
        return;
    }

    document.getElementById("results").innerHTML="<p>Processing…</p>";

    let allImages=[];

    for (const f of FL){
        const imgs = await extractImagesFromDocx(f);
        allImages.push(...imgs);
    }

    /* Compute SHA‑256 only (pHash removed!) */
    for (const img of allImages){
        img.sha = await sha256(img.data);
    }

    /* Group by SHA */
    let shaGroups={};
    allImages.forEach(img=>{
        if(!shaGroups[img.sha]) shaGroups[img.sha]=[];
        shaGroups[img.sha].push(img);
    });

    renderOutput(shaGroups);
    makeAccordion();

    window._shaGroups=shaGroups;
    window._allImages=allImages;
}

/* ---------------- ZIP Export ---------------- */
async function exportZIP(){
    const zip=new JSZip();

    window._allImages.forEach(img=>{
        zip.file(img.fileName+"_"+img.internalName.replace("word/media/",""), img.data);
    });

    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="extracted_images.zip";
    a.click();
}

/* ---------------- Accordion ---------------- */
function makeAccordion(){
    document.querySelectorAll(".accordion").forEach(acc=>{
        acc.onclick=function(){
            this.classList.toggle("active");
            let panel=this.nextElementSibling;
            panel.style.display = panel.style.display==="block" ? "none" : "block";
        };
    });
}

/* ---------------- Render Output ---------------- */
function renderOutput(shaGroups){
    let results = document.getElementById("results");
    results.innerHTML="";

    /* Exact matches */
    results.innerHTML+=`
        <button class="accordion">SHA‑256 Exact Matches <span class="icon">▶</span></button>
        <div class="panel" id="shaPanel"></div>`;
    let sp=document.getElementById("shaPanel");

    Object.entries(shaGroups).forEach(([hash,imgs])=>{
        if(imgs.length<=1) return;
        let html=`<div class="match-group"><h3>${imgs.length} Exact Matches</h3><code>${hash}</code>`;
        imgs.forEach(i=> html+=renderCard(i));
        html+=`</div>`;
        sp.innerHTML+=html;
    });

    /* Unique */
    results.innerHTML+=`
        <button class="accordion">Unique Images <span class="icon">▶</span></button>
        <div class="panel" id="uniqPanel"></div>`;
    let up=document.getElementById("uniqPanel");

    Object.entries(shaGroups).forEach(([hash,imgs])=>{
        if(imgs.length===1) up.innerHTML+=renderCard(imgs[0]);
    });
}

/* ---------------- Image Card ---------------- */
function renderCard(img){
    let url = URL.createObjectURL(new Blob([img.data]));
    return `
        <div class="image-card">
            <img src="${url}">
            <strong>File:</strong> ${img.fileName}<br>
            <strong>Internal:</strong> ${img.internalName}
            <code>SHA256: ${img.sha}</code>
        </div>`;
}

/* ---------------- CSV Export ---------------- */
function downloadCSV_SHA(){
    let rows=["MatchGroupID_SHA256,FileName,InternalName,SHA256,IsExactMatch"];
    let id=1;

    Object.entries(window._shaGroups).forEach(([hash,imgs])=>{
        imgs.forEach(i=>{
            rows.push([
                imgs.length>1? id :"",
                i.fileName,
                i.internalName,
                i.sha,
                imgs.length>1
            ].join(","));
        });
        if(imgs.length>1) id++;
    });

    let blob = new Blob([rows.join("\n")],{type:"text/csv"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="sha256_matches.csv";
    a.click();
}

</script>
</body>
</html>
